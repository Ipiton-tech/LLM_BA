# ==========================================
# ТЕМА В СТИЛЕ DIPLODOC (ЗЕЛЁНЫЕ ОТТЕНКИ) – ПОЛНАЯ КОНФИГУРАЦИЯ
# ==========================================

# --- ОСНОВНОЙ АКЦЕНТНЫЙ ЦВЕТ ---
# От этого цвета автоматически рассчитываются:
#   base-selection, link, link-hover, tab-active, tab-text, tab-text-hover, quote
# Любое значение можно переопределить вручную ниже
base-brand: rgb(84,186,126)

# ==========================================
# ОБЩИЕ НАСТРОЙКИ (для светлой и тёмной тем)
# ==========================================

# --- ТЕКСТ ---
text-primary: rgb(26,26,46)       # Основной текст страниц, текст в таблицах
text-secondary: rgb(107,114,128)  # Второстепенный текст: пункты оглавления, иконки настроек

# --- ФОН ---
base-background: rgb(255,255,255)   # Фон всей страницы
base-selection: rgb(232,245,238)    # Выбранная страница в левом меню, выбранный пункт в дропдауне
base-simple-hover: rgb(245,247,250) # Цвет при наведении на элементы интерфейса

# --- ССЫЛКИ ---
link: rgb(84,186,126)    # Цвет всех ссылок
link-hover: rgb(61,160,104) # Цвет ссылок при наведении

# --- ВКЛАДКИ (ТАБЫ) ---
tab-active: rgb(84,186,126)    # Цвет активной (выбранной) вкладки
tab-text: rgb(26,26,46)        # Цвет текста на вкладках
tab-text-hover: rgb(61,160,104) # Цвет текста на вкладках при наведении

# --- ЦИТАТЫ ---
quote: rgb(232,245,238) # Цвет фона для цитат (блоков quote)

# --- ПОДСКАЗКИ И ТЕРМИНЫ ---
term-dfn-background: rgb(245,247,250) # Фон всплывающих подсказок при наведении на термин

# --- ЛИНИИ И РАЗДЕЛИТЕЛИ ---
line-generic: rgb(224,228,232) # Цвет линий между элементами, рамки таблиц, линия табов

# --- ОФОРМЛЕНИЕ КОДА ---
code: rgb(26,26,46)                     # Цвет текста в блоке кода (pre)
code-background: rgb(245,247,250)       # Фон блока кода
inline-code: rgb(84,186,126)            # Цвет текста во встроенном фрагменте кода (`code`)
inline-code-background: rgb(232,245,238) # Фон встроенного фрагмента кода

# --- ТАБЛИЦЫ ---
table: rgb(26,26,46)                 # Цвет текста в таблице
table-background: rgb(255,255,255)   # Фон таблицы
table-row-background: rgb(245,247,250) # Цвет фона чётных (выделяющихся) рядов таблицы
table-border: rgb(224,228,232)       # Рамка таблицы

# --- МИНИ-ОГЛАВЛЕНИЕ СТАТЬИ (справа) ---
mini-toc-border: rgb(224,228,232)        # Цвет общей линии оглавления статьи
mini-toc: rgb(107,114,128)              # Цвет текста пунктов оглавления статьи
mini-toc-hover: rgb(84,186,126)         # Цвет текста пунктов оглавления статьи при наведении
mini-toc-active: rgb(84,186,126)        # Цвет текста активного пункта оглавления статьи
mini-toc-active-border: rgb(84,186,126) # Цвет линии активного пункта оглавления статьи

# ==========================================
# ПЕРЕОПРЕДЕЛЕНИЯ ДЛЯ СВЕТЛОЙ ТЕМЫ
# Параметры здесь имеют приоритет над общими
# ==========================================
light:
  # --- ССЫЛКИ ---
  link: rgb(84,186,126)
  link-hover: rgb(61,160,104)
  # --- ФОН ---
  base-background: rgb(255,255,255)
  base-selection: rgb(232,245,238)
  # --- ЦИТАТЫ ---
  quote: rgb(232,245,238)
  # --- ТАБЛИЦЫ ---
  table-row-background: rgb(245,247,250)
  # --- КОД ---
  code-background: rgb(245,247,250)
  inline-code: rgb(84,186,126)
  inline-code-background: rgb(232,245,238)
  # --- ЗАМЕТКИ (светлые пастельные фоны) ---
  note-info-background: rgb(229,236,255)      # Примечание — светло-голубой
  note-tip-background: rgb(232,245,238)       # Совет — светло-зелёный
  note-warning-background: rgb(255,243,205)   # Важно — светло-жёлтый
  note-important-background: rgb(248,215,218) # Внимание — светло-красный

# ==========================================
# ПЕРЕОПРЕДЕЛЕНИЯ ДЛЯ ТЁМНОЙ ТЕМЫ
# Параметры здесь имеют приоритет над общими
# ==========================================
dark:
  # --- БАЗОВЫЕ ЦВЕТА ---
  base-background: rgb(30,30,30)
  text-primary: rgb(224,224,224)
  text-secondary: rgb(160,160,160)
  line-generic: rgb(64,64,64)
  base-selection: rgba(84,186,126,0.15)
  base-simple-hover: rgb(42,42,42)

  # --- ССЫЛКИ ---
  link: rgb(107,207,148)
  link-hover: rgb(142,219,172)

  # --- ВКЛАДКИ ---
  tab-active: rgb(107,207,148)
  tab-text: rgb(224,224,224)
  tab-text-hover: rgb(142,219,172)

  # --- ЦИТАТЫ ---
  quote: rgba(84,186,126,0.1)

  # --- ПОДСКАЗКИ ---
  term-dfn-background: rgb(42,42,42)

  # --- КОД ---
  code: rgb(224,224,224)
  code-background: rgb(42,42,42)
  inline-code: rgb(107,207,148)
  inline-code-background: rgba(84,186,126,0.15)

  # --- ТАБЛИЦЫ ---
  table: rgb(224,224,224)
  table-background: rgb(30,30,30)
  table-row-background: rgb(42,42,42)
  table-border: rgb(64,64,64)

  # --- ЗАМЕТКИ (тёмные полупрозрачные фоны для мягкого контраста) ---
  note-info-background: rgba(34,52,73,0.1)      # Примечание — полупрозрачный голубой
  note-tip-background: rgba(84,186,126,0.1)       # Совет — полупрозрачный зелёный
  note-warning-background: rgba(255,193,7,0.1)    # Важно — полупрозрачный жёлтый
  note-important-background: rgba(220,53,69,0.1)  # Внимание — полупрозрачный красный

  # --- МИНИ-ОГЛАВЛЕНИЕ ---
  mini-toc-border: rgb(64,64,64)
  mini-toc: rgb(160,160,160)
  mini-toc-hover: rgb(107,207,148)
  mini-toc-active: rgb(107,207,148)
  mini-toc-active-border: rgb(107,207,148)