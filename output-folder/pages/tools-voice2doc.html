        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;&lt;small&gt;&lt;em&gt;&lt;strong&gt;Статус:&lt;/strong&gt; &lt;span style=\"color:#54BA7E;font-weight:600\"&gt;✓ Используем в работе&lt;/span&gt;&lt;/em&gt;&lt;/small&gt;&lt;/p&gt;\n&lt;p&gt;Сервис предназначен для транскрибации аудиозаписей встреч и их последующей трансформации в документы по заданным шаблонам. Персональные данные анонимизируются перед отправкой во внешние системы.&lt;/p&gt;\n&lt;h2 id=\"dostup\"&gt;&lt;a href=\"pages/tools-voice2doc.html#dostup\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Доступ&lt;/span&gt;&lt;/a&gt;Доступ&lt;/h2&gt;\n&lt;blockquote&gt;\n&lt;p&gt;&lt;strong&gt;URL:&lt;/strong&gt; &lt;a href=\"https://voice2doc.ipiton.ru/\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;https://voice2doc.ipiton.ru/&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Авторизация:&lt;/strong&gt; Через учетную запись пользователя в компании (&lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-4qmop7nm\"&gt;Ivanov_ai&lt;/code&gt;, пароль)&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;hr /&gt;\n&lt;div class=\"yfm-tabs\" data-diplodoc-group=\"defaultTabsGroup-gk6nj33j\" data-diplodoc-variant=\"regular\"&gt;\n&lt;div class=\"yfm-tab-list\" role=\"tablist\"&gt;\n&lt;div data-diplodoc-id=\"ключевые-сценарии-использования-инструмента\" data-diplodoc-key=\"%d0%9a%d0%bb%d1%8e%d1%87%d0%b5%d0%b2%d1%8b%d0%b5%20%d1%81%d1%86%d0%b5%d0%bd%d0%b0%d1%80%d0%b8%d0%b8%20%d0%b8%d1%81%d0%bf%d0%be%d0%bb%d1%8c%d0%b7%d0%be%d0%b2%d0%b0%d0%bd%d0%b8%d1%8f%20%d0%b8%d0%bd%d1%81%d1%82%d1%80%d1%83%d0%bc%d0%b5%d0%bd%d1%82%d0%b0\" class=\"yfm-tab yfm-tab-group active\" role=\"tab\" aria-controls=\"regular-1um92cj6\" tabindex=\"0\" data-diplodoc-is-active=\"true\"&gt;Ключевые сценарии использования инструмента&lt;/div&gt;\n&lt;div data-diplodoc-id=\"практика-применения\" data-diplodoc-key=\"%d0%9f%d1%80%d0%b0%d0%ba%d1%82%d0%b8%d0%ba%d0%b0%20%d0%bf%d1%80%d0%b8%d0%bc%d0%b5%d0%bd%d0%b5%d0%bd%d0%b8%d1%8f\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" aria-controls=\"regular-czg4lk3h\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;Практика применения&lt;/div&gt;\n&lt;div data-diplodoc-id=\"риски-использования\" data-diplodoc-key=\"%d0%a0%d0%b8%d1%81%d0%ba%d0%b8%20%d0%b8%d1%81%d0%bf%d0%be%d0%bb%d1%8c%d0%b7%d0%be%d0%b2%d0%b0%d0%bd%d0%b8%d1%8f\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" aria-controls=\"regular-2cd6kl5r\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;Риски использования&lt;/div&gt;\n&lt;/div&gt;\n&lt;div id=\"regular-1um92cj6\" class=\"yfm-tab-panel active\" role=\"tabpanel\" data-title=\"Ключевые сценарии использования инструмента\"&gt;\n&lt;ul&gt;\n&lt;li&gt;Обработка интервью с пользователями.&lt;/li&gt;\n&lt;li&gt;Структурирование итогов мозговых штурмов.&lt;/li&gt;\n&lt;li&gt;Фиксация статусов по задачам и автоматическое написание рекапов.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;\n&lt;div id=\"regular-czg4lk3h\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"Практика применения\"&gt;\n&lt;ul&gt;\n&lt;li&gt;Инструмент полезен в период с высокой загруженностью по встречам, позволяя отложить написание рекапов без потери контекста.&lt;/li&gt;\n&lt;li&gt;Возможно разработать собственные шаблоны, адаптированные под конкретные задачи (рекапы, инструкции и т.д.) для получения лаконичных и готовых к использованию документов.&lt;br /&gt;\n&lt;br /&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;blockquote&gt;\n&lt;p&gt;&lt;strong&gt;Пример промта для настройки шаблон&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Ссылка:&lt;/strong&gt; &lt;a href=\"https://ai.ipiton.ru/s/873d6754-2410-41b2-8baa-f91a41575434\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;открыть&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;/div&gt;\n&lt;div id=\"regular-2cd6kl5r\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"Риски использования\"&gt;\n&lt;ul&gt;\n&lt;li&gt;Неточность распознавания речи. Возможны ошибки транскрибации.&lt;/li&gt;\n&lt;li&gt;Принцип «мусор на входе — мусор на выходе». Хаотичное обсуждение приводит к некачественному результату.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;\n&lt;/div&gt;\n&lt;h2 id=\"mehanika-raboty-s-instrumentom\"&gt;&lt;a href=\"pages/tools-voice2doc.html#mehanika-raboty-s-instrumentom\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Механика работы с инструментом&lt;/span&gt;&lt;/a&gt;Механика работы с инструментом&lt;/h2&gt;\n&lt;ol&gt;\n&lt;li&gt;&lt;strong&gt;Загрузите аудио&lt;/strong&gt;&lt;br /&gt;\nПоддерживаются все популярные форматы: &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-evp5ijxr\"&gt;mp3&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-5oiotr3p\"&gt;wav&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-sidozxer\"&gt;m4a&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-dvgiz258\"&gt;mp4&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-qgek67gc\"&gt;webm&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-r5cqg7nh\"&gt;mkv&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-p9cnsbdn\"&gt;docx&lt;/code&gt;, &lt;code class=\"yfm-clipboard-inline-code\" role=\"button\" tabindex=\"0\" id=\"inline-code-id-lfwbade0\"&gt;pdf&lt;/code&gt;.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Выберите шаблон&lt;/strong&gt;&lt;br /&gt;\nГотовый из библиотеки или создайте свой.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Получите документ&lt;/strong&gt;&lt;br /&gt;\nСкачайте результат и используйте его в дальнейшей работе.&lt;/li&gt;\n&lt;/ol&gt;\n&lt;br /&gt;\n&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;! Конфиденциальность&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;При использовании инструмента записи встреч, особенно с внешними участниками, &lt;strong&gt;всегда предупреждайте их о записи&lt;/strong&gt; и целях ее использования.&lt;br /&gt;\nВ случае если предварительно запись не была включена, рекомендуется в ходе встречи предупредить участников о старте записи и &lt;strong&gt;повторно проговорить&lt;/strong&gt; о договоренностях, утвержденных ранее.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.39.2"},{"name":"description","content":"Сервис для транскрибации аудиозаписей встреч и их трансформации в документы по шаблонам."}],"style":[],"script":[],"title":"Voice2Doc — инструмент транскрибации и генерации документов","description":"Сервис для транскрибации аудиозаписей встреч и их трансформации в документы по шаблонам.","vcsPath":"pages/tools-voice2doc.md"},"headings":[{"title":"Доступ","href":"pages/tools-voice2doc.html#dostup","level":2},{"title":"Механика работы с инструментом","href":"pages/tools-voice2doc.html#mehanika-raboty-s-instrumentom","level":2}],"title":"Voice2Doc"},"router":{"pathname":"pages/tools-voice2doc","depth":2,"base":"../"},"lang":"ru","langs":["ru"],"viewerInterface":{"search":true,"darkMode":true,"toc":true,"feedback":true},"search":{"provider":"local","tolerance":2,"confidense":"phrased","enabled":true,"api":"_search\\api.js","link":"_search\\ru\\index.html"}}
