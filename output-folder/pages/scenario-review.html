        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;В рамках работы бизнес-аналитика ИИ используется как инструмент для рецензирования уже написанного ТЗ или функциональных требований (ФТ), позволяя получить объективную обратную связь и выявить слабые места.&lt;/p&gt;\n&lt;p&gt;ИИ способен анализировать требования и акцентировать внимание на потенциальных рисках проекта.&lt;/p&gt;\n&lt;h2 id=\"mehanika-raboty-s-instrumentom\"&gt;&lt;a href=\"pages/scenario-review.html#mehanika-raboty-s-instrumentom\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Механика работы с инструментом&lt;/span&gt;&lt;/a&gt;Механика работы с инструментом&lt;/h2&gt;\n&lt;h3 id=\"1-napishite-tz-i-otpravte-na-analiz\"&gt;&lt;a href=\"pages/scenario-review.html#1-napishite-tz-i-otpravte-na-analiz\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;1. Напишите ТЗ и отправьте на анализ&lt;/span&gt;&lt;/a&gt;&lt;strong&gt;1. Напишите ТЗ и отправьте на анализ&lt;/strong&gt;&lt;/h3&gt;\n&lt;p&gt;Аналитик самостоятельно пишет ТЗ и использует ИИ для анализа и оценки материала.&lt;br /&gt;\n&lt;br /&gt;&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;&lt;em&gt;&lt;strong&gt;Пример промта&lt;/strong&gt;&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;&lt;em&gt;Оцени описание технического задания.&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;&lt;em&gt;&lt;strong&gt;Ссылка на промт:&lt;/strong&gt; &lt;a href=\"https://ai.ipiton.ru/s/f5c9eb54-64e8-4efc-b254-d345267a805c\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;открыть&lt;/a&gt;&lt;/em&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3 id=\"2-poluchite-ocenku\"&gt;&lt;a href=\"pages/scenario-review.html#2-poluchite-ocenku\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;2. Получите оценку&lt;/span&gt;&lt;/a&gt;&lt;strong&gt;2. Получите оценку&lt;/strong&gt;&lt;/h3&gt;\n&lt;p&gt;ИИ предоставляет оценку по шкале (например, от 1 до 5), указывая на сильные стороны, потенциальные риски и зоны для улучшения, что помогает повысить качество документации.&lt;br /&gt;\n&lt;br /&gt;&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Ориентиры по качеству ТЗ&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Оценка 3,5/5&lt;/strong&gt; — достаточна для отправки материала внутреннему разработчику.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Оценка не ниже 4/5&lt;/strong&gt; — необходима при подготовке материала для внешнего разработчика, не знакомого с бизнес-процессами компании.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;h3 id=\"3-dorabotajte-tz\"&gt;&lt;a href=\"pages/scenario-review.html#3-dorabotajte-tz\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;3. Доработайте ТЗ&lt;/span&gt;&lt;/a&gt;&lt;strong&gt;3. Доработайте ТЗ&lt;/strong&gt;&lt;/h3&gt;\n&lt;p&gt;Аналитик изучает рекомендации и дорабатывает ТЗ / ФТ.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Итеративное улучшение:&lt;/strong&gt;&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Вносятся те правки, которые считаются объективно полезными.&lt;/li&gt;\n&lt;li&gt;Обновленная версия ТЗ направляется на повторную проверку ИИ, чтобы оценить, как изменилась итоговая оценка и какие слабые стороны остались.&lt;/li&gt;\n&lt;li&gt;Цикл может повторяться требуемое количество раз, чтобы довести ТЗ до желаемого качества (например, с оценки 3,5/5 до 4,9/5).&lt;/li&gt;\n&lt;/ul&gt;\n&lt;br /&gt;\n&lt;div class=\"yfm-note yfm-accent-warning\" note-type=\"warning\"&gt;&lt;p class=\"yfm-note-title\"&gt;! Не все рекомендации нужно внедрять&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;p&gt;ИИ склонен находить что улучшить, даже если в этом нет необходимости.&lt;/p&gt;\n&lt;p&gt;Чтобы исключить погрешность при оценке ТЗ, при последующей итерации с ИИ в промте необходимо указать на игнорирование тех ошибок, которые, по мнению бизнес-аналитика, незначительны.&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.39.2"},{"name":"description","content":"Использование ИИ для рецензирования ТЗ и выявления слабых мест."}],"title":"Оценка готового технического задания","description":"Использование ИИ для рецензирования ТЗ и выявления слабых мест.","vcsPath":"pages/scenario-review.md"},"headings":[{"title":"Механика работы с инструментом","href":"pages/scenario-review.html#mehanika-raboty-s-instrumentom","level":2,"items":[{"title":"1. Напишите ТЗ и отправьте на анализ","href":"pages/scenario-review.html#1-napishite-tz-i-otpravte-na-analiz","level":3},{"title":"2. Получите оценку","href":"pages/scenario-review.html#2-poluchite-ocenku","level":3},{"title":"3. Доработайте ТЗ","href":"pages/scenario-review.html#3-dorabotajte-tz","level":3}]}],"title":"Оценка готового технического задания"},"router":{"pathname":"pages/scenario-review","depth":2,"base":"../"},"lang":"ru","langs":["ru"],"viewerInterface":{"search":true,"darkMode":true,"toc":true,"feedback":true},"search":{"provider":"local","tolerance":2,"confidense":"phrased","enabled":true,"api":"_search\\api.js","link":"_search\\ru\\index.html"}}
