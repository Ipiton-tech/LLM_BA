            {"data":{"leading":false,"html":"&lt;p&gt;&lt;small&gt;&lt;em&gt;&lt;strong&gt;Статус:&lt;/strong&gt; &lt;span style=\"color:#54BA7E;font-weight:600\"&gt;✓ Используем в работе&lt;/span&gt;&lt;/em&gt;&lt;/small&gt;&lt;/p&gt;\n&lt;p&gt;Основная проблема, которую призван решить инструмент — работа с кодом в системах 1С, где отсутствует документация, комментарии и шаблоны.&lt;/p&gt;\n&lt;p&gt;ИИ может выполнить анализ программного кода, инициировать автоматическую генерацию документации, сценариев тестирования и технических заданий.&lt;/p&gt;\n&lt;h2 id=\"praktika-primeneniya\"&gt;&lt;a href=\"pages/scenario-code.html#praktika-primeneniya\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Практика применения&lt;/span&gt;&lt;/a&gt;Практика применения&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;Использование ИИ позволяет понять логику работы обработки без участия разработчика, получить рабочие Excel-примеры, а также сформировать инструкции для пользователей, тестов и техническое задание на доработку.&lt;/li&gt;\n&lt;li&gt;Сгенерированные документы служат «рыбой» и значительно экономят время на подготовку пользовательской документации.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;br /&gt;\n&lt;h2 id=\"mehanika-raboty-s-instrumentom\"&gt;&lt;a href=\"pages/scenario-code.html#mehanika-raboty-s-instrumentom\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Механика работы с инструментом&lt;/span&gt;&lt;/a&gt;Механика работы с инструментом&lt;/h2&gt;\n&lt;h3 id=\"shag-1-pervichnyj-analiz\"&gt;&lt;a href=\"pages/scenario-code.html#shag-1-pervichnyj-analiz\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Шаг 1: Первичный анализ&lt;/span&gt;&lt;/a&gt;&lt;strong&gt;Шаг 1: Первичный анализ&lt;/strong&gt;&lt;/h3&gt;\n&lt;p&gt;Загрузите в ИИ код обработки из 1С, скриншоты интерфейса, текст ошибки и сформулируйте конкретный запрос (промт).&lt;br /&gt;\n&lt;br /&gt;&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;&lt;strong&gt;Пример промта для первичного анализа&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;&lt;em&gt;У меня есть обработка в 1С. Объясни языком для аналитика что делает обработка общими словами. Какие данные нужно заполнить и на что они влияют. Какие объекты создаются в 1С и какие проверки и параметры есть.&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Ссылка на промт:&lt;/strong&gt; &lt;a href=\"https://ai.ipiton.ru/s/1c8d0558-6aad-4fe5-9b34-8631eb806135\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;открыть&lt;/a&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3 id=\"shag-2-generaciya-artefaktov\"&gt;&lt;a href=\"pages/scenario-code.html#shag-2-generaciya-artefaktov\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Шаг 2: Генерация артефактов&lt;/span&gt;&lt;/a&gt;&lt;strong&gt;Шаг 2: Генерация артефактов&lt;/strong&gt;&lt;/h3&gt;\n&lt;p&gt;На основе уже проанализированного кода возможно сгенерировать практические артефакты:&lt;/p&gt;\n&lt;div class=\"yfm-tabs yfm-tabs-accordion\" data-diplodoc-group=\"defaultTabsGroup-70x2cpcn\" data-diplodoc-variant=\"accordion\"&gt;\n&lt;div data-diplodoc-id=\"excel-файл\" data-diplodoc-key=\"excel-%d1%84%d0%b0%d0%b9%d0%bb\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" aria-controls=\"accordion-rcmgw3zz\" tabindex=\"0\" data-diplodoc-is-active=\"false\"&gt;Excel-файл&lt;/div&gt;\n&lt;div id=\"accordion-rcmgw3zz\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"Excel-файл\"&gt;\n&lt;h4 id=\"generaciya-excel-fajla-dlya-zagruzki\"&gt;&lt;a href=\"pages/scenario-code.html#generaciya-excel-fajla-dlya-zagruzki\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Генерация Excel-файла для загрузки&lt;/span&gt;&lt;/a&gt;Генерация Excel-файла для загрузки&lt;/h4&gt;\n&lt;p&gt;&lt;strong&gt;Промт:&lt;/strong&gt; &lt;em&gt;Создай пример excel для загрузки, укажи какие столбцы являются обязательными и какой тип данных там должен быть.&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Ссылка:&lt;/strong&gt; &lt;a href=\"https://ai.ipiton.ru/s/1c8d0558-6aad-4fe5-9b34-8631eb806135\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;открыть&lt;/a&gt;&lt;/p&gt;\n&lt;/div&gt;\n&lt;div data-diplodoc-id=\"сценарий-тестирования\" data-diplodoc-key=\"%d0%a1%d1%86%d0%b5%d0%bd%d0%b0%d1%80%d0%b8%d0%b9%20%d1%82%d0%b5%d1%81%d1%82%d0%b8%d1%80%d0%be%d0%b2%d0%b0%d0%bd%d0%b8%d1%8f\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" aria-controls=\"accordion-ipzuw3vk\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;Сценарий тестирования&lt;/div&gt;\n&lt;div id=\"accordion-ipzuw3vk\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"Сценарий тестирования\"&gt;\n&lt;h4 id=\"generaciya-scenariya-testirovaniya\"&gt;&lt;a href=\"pages/scenario-code.html#generaciya-scenariya-testirovaniya\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Генерация сценария тестирования&lt;/span&gt;&lt;/a&gt;Генерация сценария тестирования&lt;/h4&gt;\n&lt;p&gt;&lt;strong&gt;Промт:&lt;/strong&gt; &lt;em&gt;Напиши сценарий тестирования для пользователя по шагам, простым языком. Он должен включать в себя подготовительный этап, проверку основного позитивного сценария, а также кейсы для проверки обработки, дублей и ошибок.&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Ссылка:&lt;/strong&gt; &lt;a href=\"https://ai.ipiton.ru/s/1c8d0558-6aad-4fe5-9b34-8631eb806135\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;открыть&lt;/a&gt;&lt;/p&gt;\n&lt;/div&gt;\n&lt;div data-diplodoc-id=\"инструкция\" data-diplodoc-key=\"%d0%98%d0%bd%d1%81%d1%82%d1%80%d1%83%d0%ba%d1%86%d0%b8%d1%8f\" class=\"yfm-tab yfm-tab-group\" role=\"tab\" aria-controls=\"accordion-8yh79p93\" tabindex=\"-1\" data-diplodoc-is-active=\"false\"&gt;Инструкция&lt;/div&gt;\n&lt;div id=\"accordion-8yh79p93\" class=\"yfm-tab-panel\" role=\"tabpanel\" data-title=\"Инструкция\"&gt;\n&lt;h4 id=\"generaciya-instrukcii-dlya-polzovatelya\"&gt;&lt;a href=\"pages/scenario-code.html#generaciya-instrukcii-dlya-polzovatelya\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Генерация инструкции для пользователя&lt;/span&gt;&lt;/a&gt;Генерация инструкции для пользователя&lt;/h4&gt;\n&lt;p&gt;&lt;strong&gt;Промт:&lt;/strong&gt; &lt;em&gt;Напиши инструкцию для пользователя, чтобы смог разобраться любой сотрудник.&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Ссылка:&lt;/strong&gt; &lt;a href=\"https://ai.ipiton.ru/s/1c8d0558-6aad-4fe5-9b34-8631eb806135\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;открыть&lt;/a&gt;&lt;/p&gt;\n&lt;/div&gt;\n&lt;/div&gt;\n","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.39.2"},{"name":"description","content":"Использование ИИ для анализа кода 1С, генерации документации, тестов и ТЗ."}],"style":[],"script":[],"title":"Анализ и документирование программного кода (1С)","description":"Использование ИИ для анализа кода 1С, генерации документации, тестов и ТЗ.","vcsPath":"pages/scenario-code.md"},"headings":[{"title":"Практика применения","href":"pages/scenario-code.html#praktika-primeneniya","level":2},{"title":"Механика работы с инструментом","href":"pages/scenario-code.html#mehanika-raboty-s-instrumentom","level":2,"items":[{"title":"Шаг 1: Первичный анализ","href":"pages/scenario-code.html#shag-1-pervichnyj-analiz","level":3},{"title":"Шаг 2: Генерация артефактов","href":"pages/scenario-code.html#shag-2-generaciya-artefaktov","level":3,"items":[{"title":"Генерация Excel-файла для загрузки","href":"pages/scenario-code.html#generaciya-excel-fajla-dlya-zagruzki","level":4},{"title":"Генерация сценария тестирования","href":"pages/scenario-code.html#generaciya-scenariya-te
