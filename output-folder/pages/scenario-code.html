        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;p&gt;Основная проблема, которую призван решить инструмент — работа с кодом в системах 1С, где отсутствует документация, комментарии и шаблоны.&lt;/p&gt;\n&lt;p&gt;ИИ может выполнить анализ программного кода, инициировать автоматическую генерацию документации, сценариев тестирования и технических заданий.&lt;/p&gt;\n&lt;h2 id=\"praktika-primeneniya\"&gt;&lt;a href=\"pages/scenario-code.html#praktika-primeneniya\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Практика применения&lt;/span&gt;&lt;/a&gt;Практика применения&lt;/h2&gt;\n&lt;div style=\"margin-left:20px\"&gt;\n&lt;p&gt;&lt;svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" width=\"24\" height=\"24\"&gt;&lt;title&gt;chevron-double-right&lt;/title&gt;&lt;path d=\"M5.59,7.41L7,6L13,12L7,18L5.59,16.59L10.17,12L5.59,7.41M11.59,7.41L13,6L19,12L13,18L11.59,16.59L16.17,12L11.59,7.41Z\"&gt;&lt;/path&gt;&lt;/svg&gt;   Использование ИИ позволяет понять логику работы обработки без участия разработчика, получить рабочие Excel-примеры, а также сформировать инструкции для пользователей, тестов и техническое задание на доработку.&lt;/p&gt;\n&lt;/div&gt;\n&lt;br /&gt;\n&lt;div style=\"margin-left:20px\"&gt;\n&lt;p&gt;&lt;svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" width=\"24\" height=\"24\"&gt;&lt;title&gt;chevron-double-right&lt;/title&gt;&lt;path d=\"M5.59,7.41L7,6L13,12L7,18L5.59,16.59L10.17,12L5.59,7.41M11.59,7.41L13,6L19,12L13,18L11.59,16.59L16.17,12L11.59,7.41Z\"&gt;&lt;/path&gt;&lt;/svg&gt;   Сгенерированные документы служат «рыбой» и значительно экономят время на подготовку пользовательской документации.&lt;/p&gt;\n&lt;/div&gt;\n&lt;br /&gt;\n&lt;h2 id=\"mehanika-raboty-s-instrumentom\"&gt;&lt;a href=\"pages/scenario-code.html#mehanika-raboty-s-instrumentom\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Механика работы с инструментом&lt;/span&gt;&lt;/a&gt;Механика работы с инструментом&lt;/h2&gt;\n&lt;h3 id=\"1-pervichnyj-analiz\"&gt;&lt;a href=\"pages/scenario-code.html#1-pervichnyj-analiz\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;1. Первичный анализ&lt;/span&gt;&lt;/a&gt;&lt;strong&gt;1. Первичный анализ&lt;/strong&gt;&lt;/h3&gt;\n&lt;p&gt;Загрузите в ИИ код обработки из 1С, скриншоты интерфейса, текст ошибки и сформулируйте конкретный запрос (промт).&lt;br /&gt;\n&lt;br /&gt;&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;&lt;em&gt;&lt;strong&gt;Пример промта&lt;/strong&gt;&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;&lt;em&gt;У меня есть обработка в 1С. Объясни языком для аналитика что делает обработка общими словами. Какие данные нужно заполнить и на что они влияют. Какие объекты создаются в 1С и какие проверки и параметры есть.&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;&lt;em&gt;&lt;strong&gt;Ссылка на промт:&lt;/strong&gt; &lt;a href=\"https://ai.ipiton.ru/s/1c8d0558-6aad-4fe5-9b34-8631eb806135\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;открыть&lt;/a&gt;&lt;/em&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3 id=\"2-generaciya-artefaktov\"&gt;&lt;a href=\"pages/scenario-code.html#2-generaciya-artefaktov\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;2. Генерация артефактов&lt;/span&gt;&lt;/a&gt;&lt;strong&gt;2. Генерация артефактов&lt;/strong&gt;&lt;/h3&gt;\n&lt;p&gt;На основе уже проанализированного кода возможно сгенерировать практические артефакты:&lt;/p&gt;\n&lt;details class=\"yfm-cut\" name=\"cutgroup\"&gt;&lt;summary class=\"yfm-cut-title\"&gt;&lt;strong&gt;Excel-файл&lt;/strong&gt;&lt;/summary&gt;&lt;div class=\"yfm-cut-content\"&gt;&lt;p&gt;Генерация Excel-файла для загрузки.&lt;br /&gt;\n&lt;br /&gt;&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;&lt;em&gt;&lt;strong&gt;Пример промта&lt;/strong&gt;&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;&lt;em&gt;Создай пример excel для загрузки, укажи какие столбцы являются обязательными и какой тип данных там должен быть.&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;&lt;em&gt;&lt;strong&gt;Ссылка на промт:&lt;/strong&gt; &lt;a href=\"https://ai.ipiton.ru/s/1c8d0558-6aad-4fe5-9b34-8631eb806135\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;открыть&lt;/a&gt;&lt;/em&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;/div&gt;&lt;/details&gt;&lt;details class=\"yfm-cut\" name=\"cutgroup\"&gt;&lt;summary class=\"yfm-cut-title\"&gt;&lt;strong&gt;Сценарий тестирования&lt;/strong&gt;&lt;/summary&gt;&lt;div class=\"yfm-cut-content\"&gt;&lt;p&gt;Генерация сценария тестирования.&lt;br /&gt;\n&lt;br /&gt;&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;&lt;em&gt;&lt;strong&gt;Пример промта&lt;/strong&gt;&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;&lt;em&gt;Напиши сценарий тестирования для пользователя по шагам, простым языком. Он должен включать в себя подготовительный этап, проверку основного позитивного сценария, а также кейсы для проверки обработки, дублей и ошибок.&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;&lt;em&gt;&lt;strong&gt;Ссылка на промт:&lt;/strong&gt; &lt;a href=\"https://ai.ipiton.ru/s/1c8d0558-6aad-4fe5-9b34-8631eb806135\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;открыть&lt;/a&gt;&lt;/em&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;/div&gt;&lt;/details&gt;&lt;details class=\"yfm-cut\" name=\"cutgroup\"&gt;&lt;summary class=\"yfm-cut-title\" id=\"cut-3\"&gt;&lt;strong&gt;Инструкция&lt;/strong&gt;&lt;/summary&gt;&lt;div class=\"yfm-cut-content\"&gt;&lt;p&gt;Генерация инструкции для пользователя.&lt;br /&gt;\n&lt;br /&gt;&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;&lt;em&gt;&lt;strong&gt;Пример промта&lt;/strong&gt;&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;&lt;em&gt;Напиши инструкцию для пользователя, чтобы смог разобраться любой сотрудник.&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;&lt;em&gt;&lt;strong&gt;Ссылка на промт:&lt;/strong&gt; &lt;a href=\"https://ai.ipiton.ru/s/1c8d0558-6aad-4fe5-9b34-8631eb806135\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;открыть&lt;/a&gt;&lt;/em&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;/div&gt;&lt;/details&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.39.2"},{"name":"description","content":"Использование ИИ для анализа кода 1С, генерации документации, тестов и ТЗ."}],"style":[],"script":[],"csp":[{"img-src":["https://avatars.githubusercontent.com"]}],"title":"Анализ и документирование программного кода (1С)","description":"Использование ИИ для анализа кода 1С, генерации документации, тестов и ТЗ.","vcsPath":"docs/pages/scenario-code.md"},"headings":[{"title":"Практика применения","href":"pages/scenario-code.html#praktika-primeneniya","level":2},{"title":"Механика работы с инструментом","href":"pages/scenario-code.html#mehanika-raboty-s-instrumentom","level":2,"items":[{"title":"1. Первичный анализ","href":"pages/scenario-code.html#1-pervichnyj-analiz","level":3},{"title":"2. Генерация артефактов","href":"pages/scenario-code.html#2-generaciya-artefaktov","level":3}]}],"title":"Анализ и документирование программного кода"},"router":{"pathname":"pages/scenario-code","depth":2,"base":"../"},"lang":"ru","langs":["ru"],"viewerInterface":{"search":true,"darkMode":true,"toc":true,"feedback":true},"search":{"provider":"local","tolerance":2,"confidense":"phrased","enabled":true,"api":"_search\\api.js","link":"_search\\ru\\index.html"}}
