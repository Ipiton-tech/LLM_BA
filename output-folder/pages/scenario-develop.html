            {"data":{"leading":false,"html":"&lt;p&gt;Инструмент возможно использовать в качестве помощника при разработке ТЗ, предварительно указав потребность / проблему / вводную составляющую и сформулировав конкретный запрос.&lt;/p&gt;\n&lt;p&gt;ИИ может предложить очевидное решение, которое можно взять за основу будущего ТЗ.&lt;/p&gt;\n&lt;details class=\"yfm-cut\" name=\"cutgroup\"&gt;&lt;summary class=\"yfm-cut-title\"&gt;&lt;strong&gt;&lt;em&gt;Пример промта&lt;/em&gt;&lt;/strong&gt;&lt;/summary&gt;&lt;div class=\"yfm-cut-content\"&gt;&lt;blockquote&gt;\n&lt;p&gt;&lt;em&gt;Пишу задачу для разработчика 1С по созданию нового алгоритма. Запутался. Нужно чтобы алгоритм разбивал заказ на 2 РН. В первую помещал товар с приоритетом с этого склада, а во вторую весь остальной. Но что делать, если товар есть только на складе с приоритетом не ясно. Помоги описать.&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;&lt;em&gt;&lt;strong&gt;Ссылка на промт:&lt;/strong&gt; &lt;a href=\"https://ai.ipiton.ru/s/94c73a69-b8b2-47f7-8805-7b9f297574d7\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;открыть&lt;/a&gt;&lt;/em&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;/div&gt;&lt;/details&gt;&lt;details class=\"yfm-cut\" name=\"cutgroup\"&gt;&lt;summary class=\"yfm-cut-title\"&gt;&lt;strong&gt;&lt;em&gt;Пример промта&lt;/em&gt;&lt;/strong&gt;&lt;/summary&gt;&lt;div class=\"yfm-cut-content\"&gt;&lt;blockquote&gt;\n&lt;p&gt;&lt;em&gt;Мне нужно создать требования к внутренней доработке 1С. Программисты знают систему, нужно описать верхнеуровнево. Сейчас у нас есть два склада: Основной и NV. В программе нужно показывать общий остаток по этим складам. При этом, когда создается РН нужно создавать РН на разные склады по приоритету.&lt;/em&gt;&lt;br /&gt;\n&lt;em&gt;Приоритет нужно задавать в формате: Матрица приоритетов для отгрузки со складов (ЮрЛицо / Клиент, Склад, ГруппаТоваров / Товар, Приоритет — 0, 1, 2). Если остаток есть на двух складах, то сначала выбираем весь остаток с одного склада, если там товар закончится, то во вторую РН добавляем остаток с 2 склада. Все урезки фиксируем во второй РН.&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;&lt;em&gt;&lt;strong&gt;Ссылка на промт:&lt;/strong&gt; &lt;a href=\"https://ai.ipiton.ru/s/b8f85564-9da1-4e36-bce1-6ab9b545a72e\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;открыть&lt;/a&gt;&lt;/em&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;/div&gt;&lt;/details&gt;&lt;details class=\"yfm-cut\" name=\"cutgroup\"&gt;&lt;summary class=\"yfm-cut-title\" id=\"cut-3\"&gt;&lt;strong&gt;&lt;em&gt;Пример промта&lt;/em&gt;&lt;/strong&gt;&lt;/summary&gt;&lt;div class=\"yfm-cut-content\"&gt;&lt;p&gt;&lt;em&gt;У меня есть ТЗ. Оцени его и составь список вопросов и улучшений, если нужно.&lt;/em&gt;&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;&lt;em&gt;&lt;strong&gt;Ссылка на промт:&lt;/strong&gt; &lt;a href=\"https://ai.ipiton.ru/s/6d0f6c15-58f4-4af8-b1a1-4b26e215a6ff\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;открыть&lt;/a&gt;&lt;/em&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;/div&gt;&lt;/details&gt;&lt;h2 id=\"riski-ispolzovaniya\"&gt;&lt;a href=\"pages/scenario-develop.html#riski-ispolzovaniya\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Риски использования&lt;/span&gt;&lt;/a&gt;Риски использования&lt;/h2&gt;\n&lt;div style=\"margin-left:20px\"&gt;\n&lt;p&gt;&lt;svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" width=\"24\" height=\"24\"&gt;&lt;title&gt;chevron-double-right&lt;/title&gt;&lt;path d=\"M5.59,7.41L7,6L13,12L7,18L5.59,16.59L10.17,12L5.59,7.41M11.59,7.41L13,6L19,12L13,18L11.59,16.59L16.17,12L11.59,7.41Z\"&gt;&lt;/path&gt;&lt;/svg&gt;   Полная генерация ТЗ с нуля — неэффективна, т.к. инструмент предлагает слишком абстрактные решения.&lt;/p&gt;\n&lt;/div&gt;\n&lt;br /&gt;\n&lt;div style=\"margin-left:20px\"&gt;\n&lt;p&gt;&lt;svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 24 24\" width=\"24\" height=\"24\"&gt;&lt;title&gt;chevron-double-right&lt;/title&gt;&lt;path d=\"M5.59,7.41L7,6L13,12L7,18L5.59,16.59L10.17,12L5.59,7.41M11.59,7.41L13,6L19,12L13,18L11.59,16.59L16.17,12L11.59,7.41Z\"&gt;&lt;/path&gt;&lt;/svg&gt;   ИИ может сгенерировать «рыбу» ТЗ, но его качество значительно ниже, чем у человека и требует серьезной переработки.&lt;br /&gt;\nБез глубокого понимания бизнес-процесса результат будет неоптимальным.&lt;/p&gt;\n&lt;/div&gt;","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.39.2"},{"name":"description","content":"Использование ИИ как помощника при написании ТЗ на основе вводных данных."}],"style":[],"script":[],"csp":[{"img-src":["https://avatars.githubusercontent.com"]}],"title":"Разработка технического задания с помощью ИИ","description":"Использование ИИ как помощника при написании ТЗ на основе вводных данных.","vcsPath":"docs/pages/scenario-develop.md"},"headings":[{"title":"Риски использования","href":"pages/scenario-develop.html#riski-ispolzovaniya","level":2}],"title":"Разработка технического задания"},"router":{"pathname":"pages/scenario-develop","depth":2,"base":"../"},"lang":"ru","langs":["ru"],"viewerInterface":{"search":true,"darkMode":true,"toc":true,"feedback":true},"search":{"provider":"local","tolerance":2,"confidense":"phrased","enabled":true,"api":"_search\\api.js","link":"_search\\ru\\index.html"}}
