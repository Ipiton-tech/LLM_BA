            {"data":{"leading":false,"html":"&lt;p&gt;&lt;strong&gt;Статус:&lt;/strong&gt; &lt;span style=\"color:#54BA7E;font-weight:600\"&gt;✓ Используем в работе&lt;/span&gt;&lt;/p&gt;\n&lt;hr /&gt;\n&lt;h2 id=\"shag-1-generaciya-utochnyayushih-voprosov\"&gt;&lt;a href=\"pages/scenario-improve.html#shag-1-generaciya-utochnyayushih-voprosov\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Шаг 1: Генерация уточняющих вопросов&lt;/span&gt;&lt;/a&gt;Шаг 1: Генерация уточняющих вопросов&lt;/h2&gt;\n&lt;p&gt;В рамках задачи по подготовке ТЗ на доработку функциональности инструмента, ИИ может выступать в роли ассистента при написании ТЗ, генерируя уточняющие вопросы, которые помогают выявить неполноту требований.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Совет&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;h3 id=\"promt-dlya-generacii-voprosov\"&gt;&lt;a href=\"pages/scenario-improve.html#promt-dlya-generacii-voprosov\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Промт для генерации вопросов&lt;/span&gt;&lt;/a&gt;Промт для генерации вопросов&lt;/h3&gt;\n&lt;p&gt;Нужно доработать эту обработку. Необходимо добавить возможность по сохраненным настройкам производить автоматическую загрузку файлов с заранее заданной папки. После загрузки файлы должны удаляться. Составь ТЗ для разработчика. Во вложении формат, которому должно соответствовать ТЗ. Задай мне уточняющие вопросы, если это нужно.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Ссылка:&lt;/strong&gt; &lt;a href=\"https://ai.ipiton.ru/s/908d6084-cb22-4938-8a6c-c1bba821a86c\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;https://ai.ipiton.ru/s/908d6084-cb22-4938-8a6c-c1bba821a86c&lt;/a&gt;&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;hr /&gt;\n&lt;h2 id=\"shag-2-vyyavlenie-riskov\"&gt;&lt;a href=\"pages/scenario-improve.html#shag-2-vyyavlenie-riskov\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Шаг 2: Выявление рисков&lt;/span&gt;&lt;/a&gt;Шаг 2: Выявление рисков&lt;/h2&gt;\n&lt;p&gt;На основе предложенного ТЗ, ИИ помогает выявлять потенциальные риски проекта.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Совет&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;h3 id=\"promt-dlya-analiza-riskov\"&gt;&lt;a href=\"pages/scenario-improve.html#promt-dlya-analiza-riskov\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Промт для анализа рисков&lt;/span&gt;&lt;/a&gt;Промт для анализа рисков&lt;/h3&gt;\n&lt;p&gt;Какие риски нужно подсветить заказчику в рамках этого ТЗ.&lt;/p&gt;\n&lt;p&gt;&lt;strong&gt;Ссылка:&lt;/strong&gt; &lt;a href=\"https://ai.ipiton.ru/s/fd1a0be2-c81c-461f-a0c6-2b733c89b358\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;https://ai.ipiton.ru/s/fd1a0be2-c81c-461f-a0c6-2b733c89b358&lt;/a&gt;&lt;/p&gt;\n&lt;/div&gt;&lt;/div&gt;&lt;hr /&gt;\n&lt;h2 id=\"shag-3-podgotovka-k-obsuzhdeniyu-s-zakazchikom\"&gt;&lt;a href=\"pages/scenario-improve.html#shag-3-podgotovka-k-obsuzhdeniyu-s-zakazchikom\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Шаг 3: Подготовка к обсуждению с заказчиком&lt;/span&gt;&lt;/a&gt;Шаг 3: Подготовка к обсуждению с заказчиком&lt;/h2&gt;\n&lt;p&gt;ИИ возможно использовать для превентивной проработки слабых мест ТЗ и подготовки к обсуждению с заказчиком.&lt;/p&gt;\n&lt;div class=\"yfm-note yfm-accent-tip\" note-type=\"tip\"&gt;&lt;p class=\"yfm-note-title\"&gt;Совет&lt;/p&gt;\n&lt;div class=\"yfm-note-content\"&gt;&lt;h3 id=\"promt-dlya-pisma-zakazchiku\"&gt;&lt;a href=\"pages/scenario-improve.html#promt-dlya-pisma-zakazchiku\" cla
