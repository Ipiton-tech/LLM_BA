        <script type="application/json" id="diplodoc-state">
            {"data":{"leading":false,"html":"&lt;h2 id=\"mehanika-raboty-s-instrumentom\"&gt;&lt;a href=\"pages/scenario-improve.html#mehanika-raboty-s-instrumentom\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;Механика работы с инструментом&lt;/span&gt;&lt;/a&gt;Механика работы с инструментом&lt;/h2&gt;\n&lt;h3 id=\"1-generaciya-utochnyayushih-voprosov\"&gt;&lt;a href=\"pages/scenario-improve.html#1-generaciya-utochnyayushih-voprosov\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;1. Генерация уточняющих вопросов&lt;/span&gt;&lt;/a&gt;&lt;strong&gt;1. Генерация уточняющих вопросов&lt;/strong&gt;&lt;/h3&gt;\n&lt;p&gt;В рамках задачи по подготовке ТЗ на доработку функциональности инструмента, ИИ может выступать в роли ассистента при написании ТЗ, генерируя уточняющие вопросы, которые помогают выявить неполноту требований.&lt;br /&gt;\n&lt;br /&gt;&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;&lt;em&gt;&lt;strong&gt;Пример промта&lt;/strong&gt;&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;&lt;em&gt;Нужно доработать эту обработку. Необходимо добавить возможность по сохраненным настройкам производить автоматическую загрузку файлов с заранее заданной папки. После загрузки файлы должны удаляться. Составь ТЗ для разработчика. Во вложении формат, которому должно соответствовать ТЗ. Задай мне уточняющие вопросы, если это нужно.&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;&lt;em&gt;&lt;strong&gt;Ссылка на промт:&lt;/strong&gt; &lt;a href=\"https://ai.ipiton.ru/s/908d6084-cb22-4938-8a6c-c1bba821a86c\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;открыть&lt;/a&gt;&lt;/em&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3 id=\"2-vyyavlenie-riskov\"&gt;&lt;a href=\"pages/scenario-improve.html#2-vyyavlenie-riskov\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;2. Выявление рисков&lt;/span&gt;&lt;/a&gt;&lt;strong&gt;2. Выявление рисков&lt;/strong&gt;&lt;/h3&gt;\n&lt;p&gt;На основе предложенного ТЗ, ИИ помогает выявлять потенциальные риски проекта.&lt;br /&gt;\n&lt;br /&gt;&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;&lt;em&gt;&lt;strong&gt;Пример промта&lt;/strong&gt;&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;&lt;em&gt;Какие риски нужно подсветить заказчику в рамках этого ТЗ.&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;&lt;em&gt;&lt;strong&gt;Ссылка на промт:&lt;/strong&gt; &lt;a href=\"https://ai.ipiton.ru/s/fd1a0be2-c81c-461f-a0c6-2b733c89b358\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;открыть&lt;/a&gt;&lt;/em&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;h3 id=\"3-podgotovka-k-obsuzhdeniyu-s-zakazchikom\"&gt;&lt;a href=\"pages/scenario-improve.html#3-podgotovka-k-obsuzhdeniyu-s-zakazchikom\" class=\"yfm-anchor yfm-clipboard-anchor\" aria-hidden=\"true\"&gt;&lt;span class=\"visually-hidden\" data-no-index=\"true\"&gt;3. Подготовка к обсуждению с заказчиком&lt;/span&gt;&lt;/a&gt;&lt;strong&gt;3. Подготовка к обсуждению с заказчиком&lt;/strong&gt;&lt;/h3&gt;\n&lt;p&gt;ИИ возможно использовать для превентивной проработки слабых мест ТЗ и подготовки к обсуждению с заказчиком.&lt;br /&gt;\n&lt;br /&gt;&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;&lt;em&gt;&lt;strong&gt;Пример промта&lt;/strong&gt;&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;&lt;em&gt;На основании этих рисков составь письмо на заказчика с вопросами, которые нужно ему задать.&lt;/em&gt;&lt;/p&gt;\n&lt;p&gt;&lt;em&gt;&lt;strong&gt;Ссылка на промт:&lt;/strong&gt; &lt;a href=\"https://ai.ipiton.ru/s/fc81c226-1e22-425d-89d9-982ab8c72ee0\" target=\"_blank\" rel=\"noreferrer noopener\"&gt;открыть&lt;/a&gt;&lt;/em&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n","meta":{"metadata":[{"name":"generator","content":"Diplodoc Platform v5.39.2"},{"name":"description","content":"Использование ИИ для генерации уточняющих вопросов и выявления рисков проекта."}],"csp":[{"img-src":["https://avatars.githubusercontent.com"]}],"title":"Доработка тех
